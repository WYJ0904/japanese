<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#203a43" />
    <title>外语词测</title>
    <link rel="manifest" href="/manifest.webmanifest?v=20260628-1010" />
    <link rel="stylesheet" href="/styles.css?v=20260628-1010" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-icon" src="/icon-192.png" alt="" />
          <div>
            <h1>外语词测</h1>
            <p id="modelLabel">qwen3:8b</p>
          </div>
        </div>
        <div class="status" id="statusDot" title="服务状态">
          <span></span>
        </div>
      </header>

      <section class="panel auth-panel" id="authPanel">
        <div class="lock-mark">语</div>
        <h2>访问口令</h2>
        <form id="loginForm" class="login-form">
          <input id="tokenInput" type="password" autocomplete="current-password" placeholder="输入口令" />
          <button type="submit">进入</button>
        </form>
        <p class="error" id="loginError"></p>
      </section>

      <section class="workspace hidden" id="workspace">
        <nav class="tabs" aria-label="视图">
          <button class="active" data-view="setupView">词表</button>
          <button data-view="quizView">答题</button>
          <button data-view="wrongView">错题</button>
        </nav>

        <section class="view active" id="setupView">
          <div class="panel">
            <div class="settings-grid">
              <label class="field-label">
                <span>使用者</span>
                <input id="profileInput" autocomplete="nickname" placeholder="我" />
              </label>
              <label class="field-label">
                <span>判卷</span>
                <select id="gradingModeSelect">
                  <option value="normal">普通</option>
                  <option value="strict">严格</option>
                  <option value="lenient">宽松</option>
                </select>
              </label>
            </div>

            <textarea id="wordInput" placeholder="あう&#10;かえる&#10;apple&#10;important"></textarea>
            <div class="action-row">
              <button class="primary" id="startBtn">开始</button>
              <button id="shuffleBtn" title="打乱">↕</button>
              <button id="clearBtn" title="清空">×</button>
            </div>
            <div class="action-row secondary-row">
              <button id="importWordsBtn">导入词表</button>
              <button id="exportWordsBtn">导出词表</button>
            </div>
            <input id="wordFileInput" class="hidden" type="file" accept=".txt,.csv,.json,text/plain,application/json" />
          </div>
          <div class="stats-grid">
            <div><strong id="statWords">0</strong><span>词</span></div>
            <div><strong id="statWrong">0</strong><span>本轮错题</span></div>
            <div><strong id="statScore">0</strong><span>得分</span></div>
          </div>
        </section>

        <section class="view" id="quizView">
          <div class="quiz-card">
            <div class="quiz-meta">
              <span id="progressLabel">0/0</span>
              <span id="scoreLabel">得分 0</span>
            </div>
            <div class="word-display" id="wordLabel">-</div>
            <form id="answerForm" class="answer-form">
              <input id="answerInput" autocomplete="off" placeholder="中文意思" />
              <button class="primary" type="submit">提交</button>
            </form>
            <div class="action-row compact">
              <button id="skipBtn" type="button">跳过</button>
              <button id="nextNowBtn" type="button" disabled>下一题</button>
              <button id="backBtn" type="button">词表</button>
            </div>
          </div>
          <div class="result-panel hidden" id="resultPanel">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-gloss" id="resultGloss"></div>
            <div class="chips" id="acceptedChips"></div>
          </div>
        </section>

        <section class="view" id="wrongView">
          <div class="panel">
            <div class="scope-tabs">
              <button class="active" id="currentWrongTab" type="button">本轮</button>
              <button id="historyWrongTab" type="button">历史</button>
            </div>
            <p class="meta-line" id="wrongScopeLabel"></p>
            <div class="action-row">
              <button class="primary" id="reviewBtn">复习本轮</button>
              <button id="reviewHistoryBtn">复习历史</button>
            </div>
            <div class="action-row secondary-row">
              <button id="exportBtn">导出本轮 PDF</button>
              <button id="exportHistoryBtn">导出历史 PDF</button>
            </div>
            <div class="action-row secondary-row">
              <button id="clearWrongBtn">清空本轮</button>
              <button id="clearHistoryBtn">清空历史</button>
            </div>
            <div class="wrong-list" id="wrongList"></div>
          </div>
        </section>
      </section>
    </main>

    <template id="wrongItemTemplate">
      <article class="wrong-item">
        <div>
          <h3></h3>
          <p></p>
        </div>
        <strong></strong>
      </article>
    </template>

    <script src="/app.js?v=20260628-1010"></script>
  </body>
</html>
